<!DOCTYPE html>
<html>
<head>
    <title>Train Schedule</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <h2>Train Schedule</h2>

    <table>
        <thead>
            <tr>
                <th rowspan="2">Name of the Train</th>
                <th rowspan="2">Place</th>
                <th rowspan="2">Destination</th>
                <th rowspan="2">Train No.</th>
                <th colspan="2" ">Time</th>
                <th rowspan="2">Fair</th>
            </tr>
            <tr>
                <th>Arrival</th>
                <th>Departure</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Rajdhani Exp</td>
                <td>New Delhi</td>
                <td>Mumbai</td>
                <td>12951</td>
                <td>16:25</td>
                <td>08:35</td>
                <td>2800</td>
            </tr>
            <tr>
                <td>Shatabdi Exp</td>
                <td>Lucknow</td>
                <td>New Delhi</td>
                <td>12003</td>
                <td>15:35</td>
                <td>22:30</td>
                <td>1200</td>
            </tr>
            <tr>
                <td>Vande Bharat</td>
                <td>Varanasi</td>
                <td>New Delhi</td>
                <td>22435</td>
                <td>15:00</td>
                <td>23:00</td>
                <td>1800</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
