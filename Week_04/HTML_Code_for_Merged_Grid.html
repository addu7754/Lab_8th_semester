<!DOCTYPE html>
<html>
<head>
    <title>Complex Table Layout</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            text-align: center;
        }
        td {
            border: 1px solid black;
            padding: 15px;
            font-size: 18px;
        }
        img {
            display: block;
            margin: auto;
            max-width: 100px; /* Adjust image size */
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
        </tr>
        <tr>
            <td>5</td>
            <td colspan="2" rowspan="2">
                <img src="my-image.jpg" alt="Center Image">
            </td>
            <td>6</td>
        </tr>
        <tr>
            <td>7</td>
            <td>8</td>
        </tr>
        <tr>
            <td>9</td>
            <td>10</td>
            <td>11</td>
            <td>12</td>
        </tr>
    </table>

</body>
</html>
